# Datasource
quarkus.datasource.db-kind=h2
quarkus.datasource.jdbc.url=jdbc:h2:mem:testdb
quarkus.datasource.username=sa
quarkus.datasource.password=
quarkus.datasource.devservices.enabled=false
quarkus.h2.console.enabled=true
quarkus.h2.console.path=/h2-console

# Hibernate
quarkus.hibernate-orm.database.generation=drop-and-create
quarkus.hibernate-orm.log.sql=true
quarkus.hibernate-orm.validate-in-dev-mode=false

quarkus.panache.default-page-size=10

mp.jwt.verify.issuer=ms-auth
mp.jwt.verify.publickey.location=publicKey.pem

quarkus.http.port=8083

kafka.bootstrap.servers=localhost:9094

mp.messaging.outgoing.order-created.connector=smallrye-kafka
mp.messaging.outgoing.order-created.topic=order.created
mp.messaging.outgoing.order-created.value.serializer=io.quarkus.kafka.client.serialization.ObjectMapperSerializer

mp.messaging.incoming.course-archived.connector=smallrye-kafka
mp.messaging.incoming.course-archived.topic=course.archived
mp.messaging.incoming.course-archived.value.deserializer=org.acme.plataforma.courses.deserializers.CourseArchivedDeserializer
mp.messaging.incoming.course-archived.group.id=ms-orders
mp.messaging.incoming.course-archived.auto.offset.reset=earliest